<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Log</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 30px;
        }

        #status {
            color: #888;
            font-size: 14px;
            margin: 10px 0 20px;
        }

        /* Tab bar */
        #tabBar {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .tab-btn {
            padding: 7px 18px;
            font-family: Arial;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            background: #fff;
            color: #555;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        .tab-btn:hover {
            background: #e8e8e8;
        }

        .tab-btn.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }

        /* Panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .video-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 0 20px 40px;
        }

        .video-block {
            width: 280px;
            flex-shrink: 0;
        }

        .video-block p {
            margin: 6px 0 4px;
            font-size: 14px;
            color: #555;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-wrapper {
            width: 280px;
            height: 280px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Video Log Archive</h1>
    <p id="status">Loading...</p>
    <input type="text" id="searchInput" placeholder="Search videos..." oninput="filterVideos()"
        style="padding:8px 12px;width:280px;margin-bottom:20px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-family:Arial;">

    <div id="tabBar"></div>
    <div id="panels"></div>

    <script>
        const BUCKET_URL = 'https://lisa-video-storage.s3.us-east-2.amazonaws.com';
        const PREFIX = 'incident_clips/';

        // Maps S3 subfolder name (lowercased, symbols stripped) → display label
        function folderLabel(folder) {
            const key = folder.toLowerCase().replace(/[_\-\s]/g, '');
            if (key.includes('goggle')) return 'No Goggle';
            if (key.includes('glove')) return 'No Gloves';
            if (key.includes('spill')) return 'Spills';
            if (folder === '_root_') return 'General';
            return folder.replace(/_/g, ' ');
        }

        let allData = {};

        async function loadVideos() {
            const status = document.getElementById('status');
            try {
                const res = await fetch(`${BUCKET_URL}/?prefix=${PREFIX}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, 'application/xml');

                const items = [...xml.querySelectorAll('Contents')]
                    .map(n => ({
                        key: n.querySelector('Key').textContent,
                        date: n.querySelector('LastModified').textContent
                    }))
                    .filter(f => !f.key.endsWith('/') && f.key.match(/\.(mp4|webm|mov|avi|mkv|m4v)$/i));

                items.forEach(({ key, date }) => {
                    const rest = key.slice(PREFIX.length);
                    const parts = rest.split('/');
                    const folder = parts.length > 1 ? parts[0] : '_root_';
                    const filename = decodeURIComponent((parts[parts.length - 1]).replace(/\+/g, ' '));

                    if (!allData[folder]) allData[folder] = [];
                    allData[folder].push({ filename, date, url: `${BUCKET_URL}/${key}` });
                });

                const folders = Object.keys(allData).sort();
                const total = items.length;

                if (total === 0) {
                    status.textContent = 'No videos found.';
                    return;
                }

                status.textContent = `${total} video${total !== 1 ? 's' : ''} found`;
                buildTabs(folders);

            } catch (err) {
                status.textContent = 'Failed to load videos. Check bucket permissions.';
                console.error(err);
            }
        }

        function makeVideoBlock(filename, date, url) {
            const uploaded = new Date(date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            const block = document.createElement('div');
            block.className = 'video-block';
            block.dataset.name = filename.toLowerCase();
            block.innerHTML = `
                <p>${filename}</p>
                <p style="font-size:12px;color:#aaa;text-align:left;margin:2px 0 6px;">Uploaded ${uploaded}</p>
                <div class="video-wrapper">
                    <video controls>
                        <source src="${url}" type="video/mp4">
                    </video>
                </div>`;
            return block;
        }

        function buildTabs(folders) {
            const tabBar = document.getElementById('tabBar');
            const panels = document.getElementById('panels');

            // ── All tab ──
            const allBtn = document.createElement('button');
            allBtn.className = 'tab-btn active';
            allBtn.dataset.folder = '_all_';
            allBtn.textContent = 'All';
            allBtn.onclick = () => switchTab('_all_');
            tabBar.appendChild(allBtn);

            const allPanel = document.createElement('div');
            allPanel.className = 'tab-panel active';
            allPanel.id = 'panel-_all_';
            const allGrid = document.createElement('div');
            allGrid.className = 'video-grid';
            allPanel.appendChild(allGrid);
            panels.appendChild(allPanel);

            // ── One tab per subfolder ──
            folders.forEach(folder => {
                const label = folderLabel(folder);

                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.dataset.folder = folder;
                btn.textContent = label;
                btn.onclick = () => switchTab(folder);
                tabBar.appendChild(btn);

                const panel = document.createElement('div');
                panel.className = 'tab-panel';
                panel.id = `panel-${folder}`;
                const grid = document.createElement('div');
                grid.className = 'video-grid';
                panel.appendChild(grid);
                panels.appendChild(panel);

                allData[folder].forEach(({ filename, date, url }) => {
                    grid.appendChild(makeVideoBlock(filename, date, url));
                    allGrid.appendChild(makeVideoBlock(filename, date, url)); // duplicate into All
                });
            });
        }

        function switchTab(folder) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.folder === folder));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${folder}`));
            filterVideos();
        }

        function filterVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.tab-panel.active .video-block').forEach(block => {
                block.style.display = block.dataset.name.includes(query) ? '' : 'none';
            });
        }

        loadVideos();
    </script>

</body>
</html>
