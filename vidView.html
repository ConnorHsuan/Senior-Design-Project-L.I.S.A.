<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.I.S.A. — Video Log</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --surface: #0d1520;
    --surface2: #101c2a;
    --border: #1a2e45;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --green: #00ff88;
    --yellow: #ffd700;
    --red: #ff4060;
    --text: #c8dff0;
    --muted: #4a6a85;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  html, body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridShift {
    from { transform: translateY(0); }
    to   { transform: translateY(40px); }
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,12,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    box-shadow: var(--glow);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.08), transparent);
  }

  .logo-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 14px;
    height: 14px;
  }

  #searchInput {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 8px 12px 8px 32px;
    outline: none;
    width: 220px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
  }

  .filter-tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    padding: 6px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .view-toggle {
    display: flex;
    gap: 4px;
  }

  .view-btn {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }

  .view-btn:hover, .view-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .meta-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── Main ── */
  main {
    position: relative;
    z-index: 1;
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 20px;
    flex: 1;
    min-width: 140px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  /* ── Loading state ── */
  #loadingState {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 20px;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0.3; } }

  /* ── Error state ── */
  #errorState {
    display: none;
    background: rgba(255,64,96,0.08);
    border: 1px solid rgba(255,64,96,0.3);
    border-radius: 4px;
    padding: 24px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--red);
    letter-spacing: 0.1em;
    margin-bottom: 28px;
  }

  /* ── Grid view ── */
  #fileGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  #fileGrid.list-mode {
    grid-template-columns: 1fr;
  }

  /* ── File card ── */
  .file-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
    cursor: pointer;
  }

  .file-card:hover {
    border-color: rgba(0,212,255,0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,212,255,0.1);
    transform: translateY(-2px);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Video card ── */
  .video-wrapper {
    position: relative;
    background: #000;
    aspect-ratio: 16/9;
  }

  .video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .video-wrapper .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.5);
    transition: opacity 0.2s;
  }

  .video-wrapper .play-overlay svg {
    width: 48px;
    height: 48px;
    color: rgba(255,255,255,0.8);
    filter: drop-shadow(0 0 12px rgba(0,212,255,0.5));
    transition: transform 0.2s;
  }

  .file-card:hover .play-overlay svg { transform: scale(1.1); }
  .video-wrapper.playing .play-overlay { opacity: 0; pointer-events: none; }

  /* ── List mode video ── */
  #fileGrid.list-mode .file-card { display: flex; align-items: stretch; }
  #fileGrid.list-mode .video-wrapper {
    width: 240px;
    flex-shrink: 0;
    aspect-ratio: unset;
    min-height: 135px;
  }
  #fileGrid.list-mode .file-thumb {
    width: 240px;
    flex-shrink: 0;
    min-height: 90px;
  }
  #fileGrid.list-mode .card-body { flex: 1; }

  /* ── Non-video thumbnail ── */
  .file-thumb {
    aspect-ratio: 16/9;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }

  .thumb-icon {
    font-size: 2.5rem;
    opacity: 0.6;
  }

  .thumb-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── Card body ── */
  .card-body {
    padding: 14px 16px;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    padding: 3px 7px;
    border-radius: 2px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .badge-video  { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
  .badge-image  { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
  .badge-audio  { background: rgba(255,215,0,0.1); color: var(--yellow); border: 1px solid rgba(255,215,0,0.2); }
  .badge-doc    { background: rgba(0,102,255,0.1); color: #66aaff; border: 1px solid rgba(0,102,255,0.2); }
  .badge-other  { background: rgba(74,106,133,0.15); color: var(--muted); border: 1px solid var(--border); }

  .card-size {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .btn-action {
    flex: 1;
    padding: 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all 0.2s;
  }

  .btn-action:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.06);
  }

  .btn-action.primary {
    background: rgba(0,212,255,0.1);
    border-color: rgba(0,212,255,0.3);
    color: var(--accent);
  }

  /* ── Empty state ── */
  #emptyState {
    display: none;
    text-align: center;
    padding: 80px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  /* ── Section labels ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Responsive */
  @media (max-width: 640px) {
    header { padding: 12px 16px; flex-wrap: wrap; }
    main { padding: 20px 16px; }
    #fileGrid { grid-template-columns: 1fr; }
    #fileGrid.list-mode .video-wrapper,
    #fileGrid.list-mode .file-thumb { width: 120px; }
    #searchInput { width: 160px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-icon">L.I<br>S.A</div>
    <div>
      <div class="logo-text">L.I.S.A.</div>
      <div class="logo-sub">Video Log Archive</div>
    </div>
  </div>

  <div class="header-controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search files..." oninput="filterFiles()">
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="tab" data-filter="video" onclick="setFilter('video',this)">Video</button>
      <button class="tab" data-filter="image" onclick="setFilter('image',this)">Image</button>
      <button class="tab" data-filter="other" onclick="setFilter('other',this)">Other</button>
    </div>

    <div class="view-toggle">
      <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="header-meta">
    <div class="meta-pill">
      <div class="status-dot"></div>
      <span>CONNECTED</span>
    </div>
    <div class="meta-pill" id="headerClock"></div>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Total Files</div>
      <div class="stat-value" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Videos</div>
      <div class="stat-value" id="statVideos">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Images</div>
      <div class="stat-value" id="statImages">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Size</div>
      <div class="stat-value" id="statSize">—</div>
    </div>
  </div>

  <div id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text">// FETCHING ARCHIVE INDEX...</div>
  </div>

  <div id="errorState"></div>

  <div class="section-header" id="sectionHeader" style="display:none">
    <div class="section-label" id="sectionLabel">Files</div>
    <div class="section-line"></div>
    <div class="section-label" id="sectionCount"></div>
  </div>

  <div id="fileGrid"></div>
  <div id="emptyState">// NO FILES MATCH CURRENT FILTER</div>
</main>

<script>
  const BUCKET_URL = 'https://lisa-video-storage.s3.us-east-2.amazonaws.com';
  const PREFIX = 'uploads/';

  let allFiles = [];
  let activeFilter = 'all';
  let currentView = 'grid';

  // Clock
  function tick() {
    const n = new Date();
    document.getElementById('headerClock').textContent =
      n.toLocaleTimeString('en-US', { hour12: false });
  }
  tick(); setInterval(tick, 1000);

  // File type helpers
  const VIDEO_EXT  = ['mp4','webm','mov','avi','mkv','m4v','ogv'];
  const IMAGE_EXT  = ['jpg','jpeg','png','gif','webp','svg','bmp'];
  const AUDIO_EXT  = ['mp3','wav','ogg','flac','aac','m4a'];
  const DOC_EXT    = ['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv'];

  function extOf(name) {
    return (name.split('.').pop() || '').toLowerCase();
  }

  function typeOf(name) {
    const e = extOf(name);
    if (VIDEO_EXT.includes(e)) return 'video';
    if (IMAGE_EXT.includes(e)) return 'image';
    if (AUDIO_EXT.includes(e)) return 'audio';
    if (DOC_EXT.includes(e))   return 'doc';
    return 'other';
  }

  function iconFor(type) {
    return { video: '🎬', image: '🖼️', audio: '🎵', doc: '📄', other: '📁' }[type] || '📁';
  }

  function fmtSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes/1048576).toFixed(1) + ' MB';
    return (bytes/1073741824).toFixed(2) + ' GB';
  }

  function shortName(key) {
    return key.replace(PREFIX, '').replace(/\+/g, ' ');
  }

  // Fetch S3 bucket listing (XML)
  async function fetchBucketListing() {
    let files = [];
    let marker = '';
    let truncated = true;

    while (truncated) {
      const url = `${BUCKET_URL}/?prefix=${encodeURIComponent(PREFIX)}&max-keys=1000${marker ? '&marker=' + encodeURIComponent(marker) : ''}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const text = await resp.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'application/xml');

      const contents = xml.querySelectorAll('Contents');
      contents.forEach(node => {
        const key  = node.querySelector('Key')?.textContent || '';
        const size = parseInt(node.querySelector('Size')?.textContent || '0', 10);
        const lastModified = node.querySelector('LastModified')?.textContent || '';

        // Skip folder entries
        if (key.endsWith('/')) return;

        files.push({ key, size, lastModified });
        marker = key;
      });

      const isTrunc = xml.querySelector('IsTruncated')?.textContent;
      truncated = isTrunc === 'true';
    }

    return files;
  }

  // Build a card
  function buildCard(file) {
    const name = shortName(file.key);
    const type = typeOf(name);
    const url  = `${BUCKET_URL}/${file.key.replace(/ /g, '+')}`;
    const card = document.createElement('div');
    card.className = 'file-card';
    card.dataset.type = type;
    card.dataset.name = name.toLowerCase();

    let mediaHTML = '';
    if (type === 'video') {
      mediaHTML = `
        <div class="video-wrapper" id="vw-${Math.random().toString(36).slice(2)}">
          <video preload="metadata" playsinline>
            <source src="${url}" type="video/${extOf(name) === 'mov' ? 'mp4' : extOf(name)}">
          </video>
          <div class="play-overlay">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </div>
        </div>`;
    } else if (type === 'image') {
      mediaHTML = `
        <div class="file-thumb">
          <img src="${url}" alt="${name}"
               style="max-width:100%;max-height:100%;object-fit:contain;"
               onerror="this.parentNode.innerHTML='<span class=\\'thumb-icon\\'>🖼️</span><span class=\\'thumb-type\\'>IMAGE</span>'">
        </div>`;
    } else {
      mediaHTML = `
        <div class="file-thumb">
          <span class="thumb-icon">${iconFor(type)}</span>
          <span class="thumb-type">${extOf(name).toUpperCase() || 'FILE'}</span>
        </div>`;
    }

    const badgeClass = `badge-${type}`;
    const dateStr = file.lastModified
      ? new Date(file.lastModified).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
      : '';

    card.innerHTML = `
      ${mediaHTML}
      <div class="card-body">
        <div class="card-title" title="${name}">${name}</div>
        <div class="card-meta">
          <span class="badge ${badgeClass}">${type}</span>
          <span class="card-size">${fmtSize(file.size)}</span>
          ${dateStr ? `<span class="card-size">${dateStr}</span>` : ''}
        </div>
        <div class="card-actions">
          ${type === 'video' ? `<button class="btn-action primary" onclick="toggleVideo(this)">▶ Play</button>` : ''}
          <a class="btn-action" href="${url}" target="_blank" rel="noopener">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
              <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Open
          </a>
          <a class="btn-action" href="${url}" download="${name}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Save
          </a>
        </div>
      </div>`;

    // Video play toggle
    if (type === 'video') {
      const wrapper = card.querySelector('.video-wrapper');
      const video   = card.querySelector('video');
      const overlay = card.querySelector('.play-overlay');

      overlay.addEventListener('click', (e) => {
        e.stopPropagation();
        video.play();
        wrapper.classList.add('playing');
      });

      video.addEventListener('pause', () => wrapper.classList.remove('playing'));
      video.addEventListener('ended', () => wrapper.classList.remove('playing'));
    }

    return card;
  }

  function toggleVideo(btn) {
    const card = btn.closest('.file-card');
    const video = card.querySelector('video');
    const wrapper = card.querySelector('.video-wrapper');
    if (video.paused) {
      video.play();
      wrapper.classList.add('playing');
      btn.textContent = '⏸ Pause';
    } else {
      video.pause();
      wrapper.classList.remove('playing');
      btn.textContent = '▶ Play';
    }
  }

  // Filter & search
  function filterFiles() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const grid  = document.getElementById('fileGrid');
    let visible = 0;

    grid.querySelectorAll('.file-card').forEach(card => {
      const matchType = activeFilter === 'all' || card.dataset.type === activeFilter ||
                        (activeFilter === 'other' && !['video','image'].includes(card.dataset.type));
      const matchSearch = !query || card.dataset.name.includes(query);
      const show = matchType && matchSearch;
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    });

    document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
    document.getElementById('sectionCount').textContent =
      `${visible} FILE${visible !== 1 ? 'S' : ''}`;
  }

  function setFilter(f, el) {
    activeFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    filterFiles();
  }

  function setView(v) {
    currentView = v;
    const grid = document.getElementById('fileGrid');
    document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
    document.getElementById('listBtn').classList.toggle('active', v === 'list');
    grid.classList.toggle('list-mode', v === 'list');
  }

  // Init
  async function init() {
    try {
      const files = await fetchBucketListing();
      allFiles = files;

      document.getElementById('loadingState').style.display = 'none';

      if (files.length === 0) {
        document.getElementById('errorState').style.display = 'block';
        document.getElementById('errorState').textContent = '// NO FILES FOUND IN ARCHIVE';
        return;
      }

      // Stats
      const videos = files.filter(f => typeOf(shortName(f.key)) === 'video').length;
      const images = files.filter(f => typeOf(shortName(f.key)) === 'image').length;
      const totalSize = files.reduce((s, f) => s + f.size, 0);

      document.getElementById('statTotal').textContent  = files.length;
      document.getElementById('statVideos').textContent = videos;
      document.getElementById('statImages').textContent = images;
      document.getElementById('statSize').textContent   = fmtSize(totalSize);
      document.getElementById('statsBar').style.display = '';
      document.getElementById('sectionHeader').style.display = '';
      document.getElementById('sectionLabel').textContent = 'Archive';

      // Render cards
      const grid = document.getElementById('fileGrid');
      files.forEach((file, i) => {
        const card = buildCard(file);
        card.style.animationDelay = `${Math.min(i * 40, 400)}ms`;
        grid.appendChild(card);
      });

      filterFiles();

    } catch (err) {
      document.getElementById('loadingState').style.display = 'none';
      const errEl = document.getElementById('errorState');
      errEl.style.display = 'block';
      errEl.innerHTML = `
        <div>// FAILED TO FETCH BUCKET INDEX</div>
        <div style="margin-top:8px;opacity:0.6;font-size:0.75rem;">${err.message}</div>
        <div style="margin-top:12px;opacity:0.5;font-size:0.7rem;">
          Ensure the bucket has public list access enabled (s3:ListBucket) and CORS configured.
        </div>`;
    }
  }

  init();
</script>
</body>
</html>
