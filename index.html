<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>L.I.S.A. Login</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: white;
    padding: 20px 30px;
    border-radius: 8px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="message"></p>
</div>

<script>
function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (
        username === "quoge gaming" &&
        password === "Onions12"
    ) {
        window.location.href = "vidView.html";
    } else {
        document.getElementById("message").innerText =
            "Invalid login";
    }
}
</script>

</body>
</html>
