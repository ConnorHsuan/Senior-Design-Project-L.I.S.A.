<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.I.S.A. — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c10;
    --surface: #0d1520;
    --border: #1a2e45;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --text: #c8dff0;
    --muted: #4a6a85;
    --error: #ff4060;
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridShift {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(0,102,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 380px;
    animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.4rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: var(--glow);
    display: block;
  }

  .brand-sub {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .corner-bracket {
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.6;
  }
  .corner-bracket.tl { top: -8px; left: -8px; border-width: 2px 0 0 2px; }
  .corner-bracket.tr { top: -8px; right: -8px; border-width: 2px 2px 0 0; }
  .corner-bracket.bl { bottom: -8px; left: -8px; border-width: 0 0 2px 2px; }
  .corner-bracket.br { bottom: -8px; right: -8px; border-width: 0 2px 2px 0; }

  .login-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 32px;
  }

  .scan-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 3s ease-in-out infinite;
    border-radius: 4px 4px 0 0;
  }

  @keyframes scan {
    0%, 100% { opacity: 0.3; transform: scaleX(0.3); }
    50% { opacity: 1; transform: scaleX(1); }
  }

  .field-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'Share Tech Mono', monospace;
  }

  input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.12), inset 0 0 8px rgba(0,212,255,0.05);
  }

  input::placeholder { color: var(--muted); opacity: 0.5; }

  .btn-login {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 3px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,212,255,0.25);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(255,255,255,0.1), transparent);
    pointer-events: none;
  }

  .message {
    margin-top: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-align: center;
    min-height: 20px;
    color: var(--error);
    animation: none;
  }

  .message.show {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-5px); }
    40%,80% { transform: translateX(5px); }
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <span class="brand-name">L.I.S.A.</span>
    <span class="brand-sub">Logged Intelligence Storage Archive</span>
  </div>

  <div class="login-card">
    <div class="scan-line"></div>
    <div class="corner-bracket tl"></div>
    <div class="corner-bracket tr"></div>
    <div class="corner-bracket bl"></div>
    <div class="corner-bracket br"></div>

    <div class="field-group">
      <label for="username">User ID</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>

    <div class="field-group">
      <label for="password">Access Code</label>
      <input type="password" id="password" placeholder="••••••••" id="password"
             onkeydown="if(event.key==='Enter') login()">
    </div>

    <button class="btn-login" onclick="login()">Authenticate</button>

    <p class="message" id="message"></p>

    <div class="status-bar">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="status-dot"></div>
        <span class="status-text">SYSTEM ONLINE</span>
      </div>
      <span class="status-text" id="clock"></span>
    </div>
  </div>
</div>

<script>
  // Live clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-US', { hour12: false });
  }
  tick();
  setInterval(tick, 1000);

  function login() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    const msg = document.getElementById('message');

    if (u === 'quoge gaming' && p === 'Onions12') {
      document.querySelector('.btn-login').textContent = 'ACCESS GRANTED';
      document.querySelector('.scan-line').style.background =
        'linear-gradient(90deg, transparent, #00ff88, transparent)';
      setTimeout(() => window.location.href = 'vidView.html', 600);
    } else {
      msg.textContent = '// AUTHENTICATION FAILED';
      msg.classList.remove('show');
      void msg.offsetWidth;
      msg.classList.add('show');
    }
  }
</script>
</body>
</html>
